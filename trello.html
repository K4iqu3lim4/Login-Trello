<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->

    <script src="https://unpkg.com/@codans/trello@2.1.0/js/stylesheet.js"></script>

    <link rel="stylesheet" href="css/style.css">


</head>
<body>

  <img src="img/trello.svg" alt="Logo Trello" width="200">

  <h1>Fazer login no Trello</h1>

  <form action="" method="GET">
    <input type="text" name="email" placeholder="Insira o e-mail"> 
    <input type="password" name="senha" placeholder="insira a senha"> 
    <input type="submit" value="Fazer login">

    <span>Ou</span>

    <button>
      <img src="img/google.svg" alt="" width="20">
      Continuar com o Google
    </button>

    
    
    <button>
      <img src="img/microsoft.svg" alt="" width="20">
      Continuar com a Microsoft
    </button>

    

    <button>
      <img src="img/apple.svg" alt="" width="20">
      Continuar com a Apple
    </button>

    

    <button>
      <img src="img/slack.svg" alt="" width="20">
      Continuar com o Slack
    </button>
  </form>

  <img src="img/atlassian.svg" alt="" width="200">
  <img src="img/analytics.svg" alt="" width="200">
  <img src="img/interactive.svg" alt="" width="200">
</body>
</html>
